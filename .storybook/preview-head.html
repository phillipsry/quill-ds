<!-- Load brand webfonts into the story preview iframe.
     next/font (which sets --font-raleway / --font-fraunces) does not run in the
     Storybook preview, so the story text falls back to the family name — load the
     real faces here so components render in Raleway / Fraunces, not a system font. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Raleway:wght@400;500;600&display=swap"
>

<!-- Docs inline-code chips: use paper-warm instead of Storybook's default grey.
     Scoped to :not(pre *) so fenced code blocks keep their own panel styling.
     The html/body background stops the white flash while a page loads. -->
<style>
  html, body {
    background: #F5EDDD; /* --paper */
  }
  .sbdocs code:not(pre code) {
    background: #EFE4CE; /* --paper-warm */
  }
  /* Docs tables zebra-stripe in paper-warm, not Storybook's blue-grey
     default (#F6F9FC). !important: the default is injected later with
     equal specificity. Odd rows stay on paper, so rows alternate
     lighter/darker within the palette. */
  .sbdocs table tr:nth-of-type(2n) {
    background-color: #EFE4CE !important; /* --paper-warm */
  }
</style>

<!-- Pages always open at the very top, never at a restored scroll position. -->
<script>
  history.scrollRestoration = 'manual'
  addEventListener('load', function () {
    scrollTo({ top: 0, behavior: 'instant' })
  })
</script>
